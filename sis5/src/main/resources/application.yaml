spring:
  application:
    name: lab5
  datasource:
    url: jdbc:postgresql://localhost:5432/sis5db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    default-schema: public
    baseline-on-migrate: true
    baseline-version: 1
    clean-disabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 50
        order_updates: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /api-ui.html
    operations-sorter: method
